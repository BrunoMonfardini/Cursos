<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TechStore</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>TechStore</h1>
  <nav>
    <a href="#">Produtos</a>
    <a href="#">Suporte</a>
    <a href="#">Contato</a>
  </nav>
</header>

<section class="hero">
  <h2>Novo SmartPhone X</h2>
  <p>Velocidade absurda. Design incrível.</p>
  <button onclick="comprar()">Comprar</button>
</section>

<section class="products">

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>SmartPhone X</h3>
    <p>R$ 4.999</p>
    <button onclick="addCarrinho('SmartPhone X')">Adicionar</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Tablet Pro</h3>
    <p>R$ 3.499</p>
    <button onclick="addCarrinho('Tablet Pro')">Adicionar</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>SmartWatch</h3>
    <p>R$ 1.999</p>
    <button onclick="addCarrinho('SmartWatch')">Adicionar</button>
  </div>

</section>

<footer>
  <p>© 2026 TechStore</p>
</footer>

<script src="script.js"></script>

</body>
</html>
